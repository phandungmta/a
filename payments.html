<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <title>Tiền đã đóng / còn lại - Sổ thua séc bóng chuyền</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="mobile.css" />
</head>
<body class="page-payments">
  <header class="app-header">
    <div>
      <p class="eyebrow">Bóng chuyền VKT</p>
      <h1>Tiền đã đóng / còn lại</h1>
      <nav class="page-nav" aria-label="Điều hướng">
        <a class="nav-link" href="index.html">Nhập séc theo ngày</a>
        <a class="nav-link" href="all-days.html">Tổng hợp tất cả các ngày</a>
        <a class="nav-link active" href="payments.html" aria-current="page">Tiền đã đóng / còn lại</a>
      </nav>
    </div>
    <div class="header-actions">
      <a class="btn ghost" href="index.html">Quay lại nhập séc</a>
    </div>
  </header>

  <section class="sync-shell">
    <div id="syncBanner" class="sync-banner"></div>
  </section>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Ghi tiền đã đóng</h2>
        <form id="paymentForm" class="stack-form">
          <label class="field-label">
            Người đã đóng
            <select id="paymentPlayer" required></select>
          </label>
          <label class="field-label">
            Số tiền / điểm đã đóng
            <input id="paymentAmount" type="number" min="0" step="1000" inputmode="numeric" placeholder="Ví dụ: 50000" required />
          </label>
          <label class="field-label">
            Thời gian đóng
            <input id="paymentAt" type="datetime-local" />
          </label>
          <label class="field-label">
            Ghi chú, có thể bỏ trống
            <input id="paymentNote" type="text" placeholder="Ví dụ: chuyển khoản, tiền mặt..." autocomplete="off" />
          </label>
          <button class="btn primary full" type="submit">+ Lưu khoản đã đóng</button>
        </form>
      </section>

      <section class="panel">
        <h2>Dữ liệu công nợ</h2>
        <div class="button-grid">
          <a class="btn" href="all-days.html">Tổng hợp tất cả ngày</a>
          <button id="btnClearPayments" class="btn danger-light span-2" type="button">Xóa toàn bộ lịch sử đã đóng</button>
        </div>
      </section>
    </aside>

    <section class="content">
      <section class="summary-grid" id="paymentSummaryGrid"></section>
      <section class="panel final-summary" id="paymentTable"></section>
      <section class="panel final-summary" id="paymentHistory"></section>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app-config.js"></script>
  <script src="shared-state.js"></script>
  <script src="remote-store.js"></script>
  <script src="payments.js"></script>
</body>
</html>
