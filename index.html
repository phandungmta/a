<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <title>Sổ thua séc bóng chuyền</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="mobile.css" />
</head>
<body class="page-entry">
  <header class="app-header">
    <div>
      <p class="eyebrow">Bóng chuyền VKT</p>
      <h1>Sổ thua bóng chuyền</h1>
      <nav class="page-nav" aria-label="Điều hướng">
        <a class="nav-link active" href="index.html" aria-current="page">Nhập séc theo ngày</a>
        <a class="nav-link" href="all-days.html">Tổng hợp tất cả các ngày</a>
        <a class="nav-link" href="payments.html">Tiền đã đóng / còn lại</a>
      </nav>
    </div>
    <div class="header-actions">
      <label class="date-filter">
        Ngày đang xem
        <input type="date" id="currentDate" />
      </label>
      <button id="btnToday" class="btn ghost" type="button">Hôm nay</button>
    </div>
  </header>

  <section class="sync-shell">
    <div id="syncBanner" class="sync-banner"></div>
  </section>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel mobile-order-entry">
        <h2>Chọn người thua</h2>
        <label class="field-label">
          Tiền / điểm mỗi người thua trong 1 séc
          <input id="stakeInput" type="number" min="0" step="1000" inputmode="numeric" placeholder="Ví dụ: 10000" />
        </label>
        <label class="field-label">
          Ghi chú séc, có thể bỏ trống
          <input id="setNote" type="text" placeholder="Ví dụ: séc 1, sân 2..." autocomplete="off" />
        </label>
        <div id="losersList" class="check-list empty-state-small"></div>
        <button id="btnSaveSet" class="btn primary full" type="button">Lưu 1 séc</button>
      </section>

      <section class="panel mobile-order-data">
        <h2>Dữ liệu</h2>
        <div class="button-grid">
          <a class="btn" href="all-days.html">Tổng hợp tất cả ngày</a>
          <a class="btn" href="payments.html">Tiền đã đóng</a>
          <button id="btnClearDate" class="btn danger-light span-2" type="button">Xóa dữ liệu ngày này</button>
        </div>
      </section>
    </aside>

    <section class="content">
      <section class="summary-grid mobile-order-summary-cards" id="summaryGrid"></section>
      <section id="finalSummary" class="panel final-summary mobile-order-summary-table"></section>
      <section id="setsContainer" class="sets-history mobile-order-history"></section>
    </section>
  </main>

  <template id="setRowTemplate">
    <article class="set-card">
      <div>
        <h3></h3>
        <p class="set-meta"></p>
        <p class="set-losers"></p>
      </div>
      <div class="set-actions">
        <button class="btn small edit-set" type="button">Sửa</button>
        <button class="btn small danger-light delete-set" type="button">Xóa</button>
      </div>
    </article>
  </template>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <input id="importJson" type="file" accept="application/json,.json" hidden />
  <script src="app-config.js"></script>
  <script src="shared-state.js"></script>
  <script src="remote-store.js"></script>
  <script src="app.js"></script>
</body>
</html>
